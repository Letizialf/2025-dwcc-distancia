<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <title>Contador de Caracteres</title>
  </head>
  <body>
    <h2>Escribe o teu texto</h2>
    <textarea id="textInput" maxlength="120" rows="4" cols="50"></textarea>
    <p>Caracteres restantes: <span id="charCount">100</span></p>
    <p id="warningMessage" style="color: red; display: none">
      Superaches o límite de caracteres
    </p>
  </body>
</html>
