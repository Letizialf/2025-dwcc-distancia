<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <title>Sistema de Comentarios</title>
  </head>
  <body>
    <h1>Deixa un comentario</h1>
    <form id="commentForm">
      <input type="text" id="name" placeholder="O teu nome" required />
      <textarea
        name="comentario"
        id="comment"
        placeholder="O teu comentario"
        required
      ></textarea>
      <button type="submit">Enviar</button>
    </form>
    <div id="commentSection"></div>
  </body>
</html>
